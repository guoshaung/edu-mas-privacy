<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>零信任隐私保护多智能体学习平台 - 暗黑版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vis-network@9.1.2/dist/vis-network.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vis-network@9.1.2/dist/vis-network.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0a0e27;
            --bg-secondary: #151932;
            --bg-tertiary: #1a1f3a;
            --accent-primary: #6366f1;
            --accent-secondary: #8b5cf6;
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border-color: rgba(99, 102, 241, 0.2);
            --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --glow-primary: 0 0 20px rgba(99, 102, 241, 0.3);
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
            animation: gradient-shift 15s ease infinite;
        }

        @keyframes gradient-shift {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.8; }
        }

        .navbar {
            background: rgba(10, 14, 39, 0.95) !important;
            backdrop-filter: blur(20px);
            border-bottom: 2px solid var(--border-color);
            box-shadow: var(--glow-primary);
            padding: 1rem 0;
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.2);
        }

        .card-header {
            background: rgba(99, 102, 241, 0.1);
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
        }

        .form-control {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .form-control:focus {
            background: var(--bg-secondary);
            border-color: var(--accent-primary);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
        }

        .btn-glow {
            background: var(--accent-gradient);
            border: none;
            color: white;
            font-weight: 600;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            box-shadow: var(--glow-primary);
            transition: all 0.3s ease;
        }

        .btn-glow:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.4);
        }

        #network-container {
            height: 400px;
            background: var(--bg-tertiary);
            border-radius: 15px;
            border: 1px solid var(--border-color);
        }

        .log-container {
            height: 300px;
            overflow-y: auto;
            background: var(--bg-tertiary);
            border-radius: 15px;
            padding: 1rem;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
        }

        .log-entry {
            margin-bottom: 0.5rem;
            padding: 0.75rem;
            border-left: 3px solid var(--accent-primary);
            background: rgba(99, 102, 241, 0.05);
            border-radius: 0 8px 8px 0;
        }

        .chat-container {
            height: 350px;
            overflow-y: auto;
            background: var(--bg-tertiary);
            border-radius: 15px;
            padding: 1rem;
        }

        .chat-message {
            margin-bottom: 1rem;
            padding: 0.8rem 1rem;
            border-radius: 12px;
            max-width: 85%;
        }

        .chat-user {
            background: var(--accent-gradient);
            margin-left: auto;
            color: white;
        }

        .chat-agent {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
        }

        .nav-tabs .nav-link {
            color: var(--text-secondary);
            border: none;
            border-bottom: 3px solid transparent;
        }

        .nav-tabs .nav-link.active {
            background: transparent;
            color: var(--accent-primary);
            border-bottom-color: var(--accent-primary);
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border-color);
            margin-top: 3rem;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="#">🔒 EduMAS Privacy Platform</a>
            <div class="navbar-nav ms-auto">
                <span class="navbar-text me-3">
                    <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#10b981;margin-right:8px;animation:pulse 2s infinite;"></span>
                    系统在线
                </span>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card text-center p-4">
                    <div class="metric-value" id="total-requests" style="font-size:2.5rem;font-weight:700;background:var(--accent-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">0</div>
                    <div class="text-muted mt-2" style="font-size:0.9rem;">总请求数</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center p-4">
                    <div class="metric-value" id="privacy-budget" style="font-size:2.5rem;font-weight:700;background:var(--accent-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">15%</div>
                    <div class="text-muted mt-2" style="font-size:0.9rem;">隐私预算使用</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center p-4">
                    <div class="metric-value" id="anomaly-count" style="font-size:2.5rem;font-weight:700;background:var(--accent-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">0</div>
                    <div class="text-muted mt-2" style="font-size:0.9rem;">GNN检测异常</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center p-4">
                    <div class="metric-value" id="active-agents" style="font-size:2.5rem;font-weight:700;background:var(--accent-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">5</div>
                    <div class="text-muted mt-2" style="font-size:0.9rem;">活跃智能体</div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-6 mb-4">
                <div class="card h-100">
                    <div class="card-header">🎮 智能体交互入口</div>
                    <div class="card-body">
                        <ul class="nav nav-tabs" id="agentTabs">
                            <li class="nav-item">
                                <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#ag2">AG2 学习诊断</button>
                            </li>
                            <li class="nav-item">
                                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#ag3">AG3 智能辅导</button>
                            </li>
                            <li class="nav-item">
                                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#ag4">AG4 资源推荐</button>
                            </li>
                            <li class="nav-item">
                                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#ag5">AG5 学习评估</button>
                            </li>
                        </ul>

                        <div class="tab-content mt-3">
                            <div class="tab-pane fade show active" id="ag2">
                                <div class="mb-3">
                                    <label class="form-label text-muted">学生特征 (0-1)</label>
                                    <div class="row g-2">
                                        <div class="col-6">
                                            <input type="number" class="form-control" id="visual" value="0.85" min="0" max="1" step="0.01" placeholder="视觉">
                                        </div>
                                        <div class="col-6">
                                            <input type="number" class="form-control" id="auditory" value="0.60" min="0" max="1" step="0.01" placeholder="听觉">
                                        </div>
                                        <div class="col-6">
                                            <input type="number" class="form-control" id="reading" value="0.70" min="0" max="1" step="0.01" placeholder="读写">
                                        </div>
                                        <div class="col-6">
                                            <input type="number" class="form-control" id="kinesthetic" value="0.65" min="0" max="1" step="0.01" placeholder="动觉">
                                        </div>
                                    </div>
                                </div>
                                <button class="btn btn-glow w-100 mt-3" onclick="diagnoseLearningStyle()">🔍 开始诊断</button>
                                <div id="ag2-result" class="mt-3"></div>
                            </div>

                            <div class="tab-pane fade" id="ag3">
                                <div class="chat-container" id="chat-box">
                                    <div class="chat-message chat-agent">
                                        <strong>🤖 AG3:</strong> 你好！我是你的智能辅导助手。请告诉我你在学习中遇到的问题。
                                    </div>
                                </div>
                                <div class="input-group mt-3">
                                    <input type="text" class="form-control" id="user-input" placeholder="输入你的问题...">
                                    <button class="btn btn-glow" onclick="sendMessage()">发送</button>
                                </div>
                            </div>

                            <div class="tab-pane fade" id="ag4">
                                <div class="mb-3">
                                    <label class="form-label text-muted">知识点</label>
                                    <input type="text" class="form-control" id="knowledge-point" value="二次函数">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label text-muted">难度 (0-1)</label>
                                    <input type="number" class="form-control" id="difficulty" value="0.65" min="0" max="1" step="0.05">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label text-muted">学习风格</label>
                                    <select class="form-select" id="learning-style">
                                        <option value="Visual">Visual (视觉型)</option>
                                        <option value="Aural">Aural (听觉型)</option>
                                        <option value="ReadWrite">Read/Write (读写型)</option>
                                        <option value="Kinesthetic">Kinesthetic (动觉型)</option>
                                    </select>
                                </div>
                                <button class="btn btn-glow w-100" onclick="recommendResources()">📚 推荐资源</button>
                                <div id="ag4-result" class="mt-3"></div>
                            </div>

                            <div class="tab-pane fade" id="ag5">
                                <div class="mb-3">
                                    <label class="form-label text-muted">知识点</label>
                                    <input type="text" class="form-control" id="test-knowledge" value="二次函数">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label text-muted">难度 (0-1)</label>
                                    <input type="number" class="form-control" id="test-difficulty" value="0.70" min="0" max="1" step="0.05">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label text-muted">题目数量</label>
                                    <input type="number" class="form-control" id="question-count" value="3" min="1" max="10">
                                </div>
                                <button class="btn btn-glow w-100" onclick="generateTest()">📝 生成测试</button>
                                <div id="ag5-result" class="mt-3"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-6 mb-4">
                <div class="card">
                    <div class="card-header">🌐 GNN实时拓扑监控</div>
                    <div class="card-body">
                        <div id="network-container"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-header d-flex justify-content-between">
                        <span>📝 实时日志监控</span>
                        <button class="btn btn-glow btn-sm" onclick="simulateFullWorkflow()">🚀 完整流程演示</button>
                    </div>
                    <div class="card-body">
                        <div class="log-container" id="log-container">
                            <div class="log-entry">
                                <span class="text-muted">[系统启动]</span>
                                <span class="text-success">✓</span>
                                零信任隐私保护多智能体学习平台初始化完成
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>🔒 零信任隐私保护多智能体学习平台 | 暗黑版</p>
        <p class="small text-muted">SRPG + LDP + 动态RBAC + GNN拓扑防御</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let learningStyle = 'Visual';
        const nodes = new vis.DataSet([
            {id: 1, label: 'A1\n(学生档案)', group: 'learner'},
            {id: 2, label: 'Gateway\n(隐私网关)', group: 'gateway'},
            {id: 3, label: 'AG2\n(学习风格)', group: 'education'},
            {id: 4, label: 'AG3\n(辅导)', group: 'education'},
            {id: 5, label: 'AG4\n(内容)', group: 'education'},
            {id: 6, label: 'AG5\n(评估)', group: 'education'}
        ]);

        const edges = new vis.DataSet([
            {from: 1, to: 2, label: '原始数据'},
            {from: 2, to: 3, label: '保护特征'},
            {from: 2, to: 4, label: '授权访问'},
            {from: 2, to: 5, label: '知识查询'},
            {from: 2, to: 6, label: '测试数据'}
        ]);

        const network = new vis.Network(
            document.getElementById('network-container'),
            {nodes: nodes, edges: edges},
            {
                nodes: {
                    shape: 'box',
                    font: {color: '#f1f5f9'},
                    color: {background: '#1a1f3a', border: '#6366f1'}
                },
                edges: {
                    color: {color: '#6366f1'},
                    font: {color: '#94a3b8'},
                    arrows: {to: true}
                },
                groups: {
                    learner: {color: {background: '#10b981', border: '#059669'}},
                    gateway: {color: {background: '#f59e0b', border: '#d97706'}},
                    education: {color: {background: '#6366f1', border: '#4f46e5'}}
                },
                physics: {enabled: true}
            }
        );

        function addLog(msg, type = 'success') {
            const container = document.getElementById('log-container');
            const time = new Date().toLocaleTimeString('zh-CN');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="text-muted">[${time}]</span> <span class="text-${type === 'error' ? 'danger' : 'success'}">${type === 'error' ? '✗' : '✓'}</span> ${msg}`;
            container.insertBefore(entry, container.firstChild);
        }

        function updateMetrics() {
            const total = document.getElementById('total-requests');
            const budget = document.getElementById('privacy-budget');
            total.textContent = parseInt(total.textContent) + 1;
            budget.textContent = (parseInt(budget.textContent) + 5) + '%';
        }

        function diagnoseLearningStyle() {
            addLog('收到学习诊断请求', 'success');
            setTimeout(() => {
                addLog('SRPG处理: 隐空间编码 + LDP噪声注入', 'success');
                addLog('消耗隐私预算: ε=0.10', 'success');

                const scores = {
                    'Visual': parseFloat(document.getElementById('visual').value),
                    'Aural': parseFloat(document.getElementById('auditory').value),
                    'ReadWrite': parseFloat(document.getElementById('reading').value),
                    'Kinesthetic': parseFloat(document.getElementById('kinesthetic').value)
                };

                const max = Math.max(...Object.values(scores));
                learningStyle = Object.keys(scores).find(k => scores[k] === max);

                const emojis = {'Visual': '👁️', 'Aural': '👂', 'ReadWrite': '📖', 'Kinesthetic': '🙌'};

                document.getElementById('ag2-result').innerHTML = `
                    <div class="alert p-3" style="background:rgba(99,102,241,0.1);border:1px solid var(--accent-primary);border-radius:12px;">
                        <h6>${emojis[learningStyle]} 诊断完成</h6>
                        <p><strong>学习风格:</strong> ${learningStyle}</p>
                        <p><strong>置信度:</strong> ${Math.round(max * 100)}%</p>
                        <hr style="border-color:var(--border-color);">
                        <small class="text-muted">各维度得分:</small><br>
                        ${Object.entries(scores).map(([s,v])=>`${s}: ${Math.round(v*100)}%`).join(' | ')}
                    </div>
                `;
                addLog(`AG2分析完成: ${learningStyle}型 (${Math.round(max*100)}%)`, 'success');
                updateMetrics();
            }, 500);
        }

        function sendMessage() {
            const input = document.getElementById('user-input');
            const msg = input.value.trim();
            if (!msg) return;

            const chat = document.getElementById('chat-box');
            chat.innerHTML += `<div class="chat-message chat-user"><strong>你:</strong> ${msg}</div>`;
            addLog(`收到用户问题: ${msg}`, 'success');
            input.value = '';

            setTimeout(() => {
                const responses = {
                    'Visual': ['试着画个图来理解', '观察图像的变化规律'],
                    'Aural': ['我可以为你讲解一遍', '听听相关的音频课程'],
                    'ReadWrite': ['把这写成笔记会更好理解', '阅读相关教材'],
                    'Kinesthetic': ['动手实践一下吧', '用实物模型来理解']
                };
                const resp = responses[learningStyle][Math.floor(Math.random() * 2)];
                chat.innerHTML += `<div class="chat-message chat-agent"><strong>🤖 AG3:</strong> ${resp}</div>`;
                chat.scrollTop = chat.scrollHeight;
                addLog('AG3生成启发式对话', 'success');
                updateMetrics();
            }, 800);
        }

        function recommendResources() {
            const kp = document.getElementById('knowledge-point').value;
            const diff = parseFloat(document.getElementById('difficulty').value);
            const style = document.getElementById('learning-style').value;

            addLog(`AG4检索资源: ${kp} (难度${diff}, ${style})`, 'success');

            setTimeout(() => {
                const res = [
                    {type: '🎥 视频', title: `${kp}基础讲解`, duration: '10分钟'},
                    {type: '🎮 交互', title: `${kp}可视化实验`, duration: '15分钟'},
                    {type: '📝 练习', title: `${kp}练习题`, count: 10}
                ];

                document.getElementById('ag4-result').innerHTML = `
                    <div class="alert p-3" style="background:rgba(99,102,241,0.1);border:1px solid var(--accent-primary);border-radius:12px;">
                        <h6>📚 推荐学习资源</h6>
                        ${res.map(r => `<div class="mb-2"><strong>${r.type}</strong> ${r.title} <small class="text-muted">(${r.duration || r.count})</small></div>`).join('')}
                    </div>
                `;
                addLog('AG4资源推荐完成', 'success');
                updateMetrics();
            }, 600);
        }

        function generateTest() {
            const kp = document.getElementById('test-knowledge').value;
            const diff = parseFloat(document.getElementById('test-difficulty').value);
            const count = parseInt(document.getElementById('question-count').value);

            addLog(`AG5生成测试: ${kp} (难度${diff}, ${count}题)`, 'success');

            setTimeout(() => {
                document.getElementById('ag5-result').innerHTML = `
                    <div class="alert p-3" style="background:rgba(245,158,11,0.1);border:1px solid var(--warning);border-radius:12px;">
                        <h6>📝 测试已生成</h6>
                        <p><strong>知识点:</strong> ${kp}</p>
                        <p><strong>题目:</strong> ${count}题</p>
                        ${Array.from({length: count}, (_, i) => `<p class="mb-1"><strong>Q${i+1}.</strong> ${kp}相关问题 ${i+1}</p>`).join('')}
                        <p class="small text-muted mt-2">⚠️ AG5是独立评估智能体，不读辅导对话，防自判幻觉</p>
                    </div>
                `;
                addLog('AG5测试生成完成（独立于AG3）', 'success');
                updateMetrics();
            }, 700);
        }

        function simulateFullWorkflow() {
            addLog('=== 完整学习流程演示开始 ===', 'success');
            setTimeout(() => addLog('步骤1: A1数据采集', 'success'), 500);
            setTimeout(() => addLog('步骤2: 网关SRPG+LDP保护', 'success'), 1500);
            setTimeout(() => addLog('步骤3: AG2学习诊断', 'success'), 2500);
            setTimeout(() => addLog('步骤4: AG3智能辅导', 'success'), 3500);
            setTimeout(() => addLog('步骤5: AG4资源推荐', 'success'), 4500);
            setTimeout(() => addLog('步骤6: AG5独立评估', 'success'), 5500);
            setTimeout(() => {
                addLog('=== 完整流程演示完成 ===', 'success');
                updateMetrics();
            }, 6000);
        }

        document.getElementById('user-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
