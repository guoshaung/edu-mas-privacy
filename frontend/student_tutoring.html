<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>&#33258;&#36866;&#24212;&#36741;&#23548;</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --card: #ffffff;
      --text: #243447;
      --muted: #6b7c93;
      --line: #dbe3ee;
      --primary: #2563eb;
      --soft: #eef4ff;
      --accent: #166534;
      --warn: #b45309;
      --danger: #b42318;
      --shadow: 0 12px 32px rgba(36, 52, 71, 0.08);
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
    .shell { width: min(1180px, calc(100% - 28px)); margin: 0 auto; padding: 24px 0 40px; }
    .topbar, .card, .hero { background: #fff; border: 1px solid var(--line); border-radius: 20px; box-shadow: var(--shadow); }
    .topbar { display: flex; justify-content: space-between; align-items: center; gap: 16px; padding: 18px 22px; margin-bottom: 20px; }
    .topbar a { color: #244e7a; text-decoration: none; font-weight: 600; }
    .hero { padding: 22px; margin-bottom: 20px; }
    .hero h1 { margin: 0 0 12px; font-size: 2rem; }
    .hero p, .muted { color: var(--muted); line-height: 1.8; }
    .hero-grid { display: grid; grid-template-columns: 1.05fr .95fr; gap: 18px; margin-top: 18px; }
    .grid { display: grid; grid-template-columns: 1.05fr .95fr; gap: 18px; }
    .stack { display: grid; gap: 18px; }
    .card { padding: 22px; }
    .card h2 { margin: 0 0 12px; font-size: 1.2rem; }
    .tag { display: inline-flex; padding: 6px 10px; border-radius: 999px; background: var(--soft); color: var(--primary); font-size: .88rem; font-weight: 700; margin-right: 8px; margin-bottom: 8px; }
    .tag.warn { background: #fff7ed; color: var(--warn); }
    .tag.success { background: #ecfdf3; color: var(--accent); }
    .list { display: grid; gap: 12px; margin-top: 14px; }
    .item { border: 1px solid var(--line); border-radius: 16px; padding: 14px; background: #fbfdff; }
    .item strong { display: block; margin-bottom: 8px; }
    .meta-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .meta-box { border: 1px solid var(--line); border-radius: 14px; padding: 14px; background: #fcfcfd; }
    .meta-box strong { display: block; margin-bottom: 8px; }
    .chat-window { border: 1px solid var(--line); border-radius: 18px; background: #fbfdff; padding: 14px; min-height: 420px; max-height: 620px; overflow: auto; }
    .bubble { max-width: 88%; padding: 12px 14px; border-radius: 16px; margin-bottom: 12px; white-space: pre-wrap; line-height: 1.7; }
    .bubble.user { margin-left: auto; background: #e8f0ff; color: #173a70; border-bottom-right-radius: 6px; }
    .bubble.ai { background: #eefbf3; color: #13452c; border-bottom-left-radius: 6px; }
    .bubble.system { background: #fff7ed; color: #8a4b08; border-bottom-left-radius: 6px; }
    .controls { display: grid; gap: 12px; margin-top: 14px; }
    textarea, input[type="range"] { width: 100%; font: inherit; }
    textarea { border: 1px solid var(--line); border-radius: 14px; padding: 12px 14px; background: #fff; min-height: 110px; resize: vertical; }
    .btn-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .btn { display: inline-flex; align-items: center; justify-content: center; border: none; border-radius: 14px; padding: 12px 16px; background: var(--primary); color: #fff; font-weight: 700; cursor: pointer; }
    .btn.secondary { background: #eef4ff; color: #244e7a; border: 1px solid #d8e3f2; }
    .btn:disabled { opacity: .6; cursor: not-allowed; }
    .status { margin-top: 10px; font-size: .95rem; }
    .status.error { color: var(--danger); }
    .status.ok { color: var(--accent); }
    pre { white-space: pre-wrap; word-break: break-word; background: #f8fafc; border: 1px solid var(--line); border-radius: 14px; padding: 14px; color: #334155; }
    .slider-row { display: grid; grid-template-columns: 1fr auto; gap: 14px; align-items: center; }
    .mini-note { font-size: .9rem; color: var(--muted); }
    .companion-panel {
      position: fixed;
      right: 22px;
      bottom: 320px;
      width: min(320px, calc(100vw - 24px));
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      z-index: 998;
    }
    .companion-panel.minimized .companion-body {
      display: none;
    }
    .companion-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      cursor: move;
    }
    .companion-title-wrap {
      min-width: 0;
    }
    .companion-panel h3 {
      margin: 0 0 8px;
      font-size: 1rem;
    }
    .companion-header h3 {
      margin: 0;
    }
    .companion-header-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .icon-btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 999px;
      width: 32px;
      height: 32px;
      cursor: pointer;
      font-weight: 700;
    }
    .companion-status {
      font-size: .92rem;
      color: var(--muted);
      line-height: 1.7;
    }
    .companion-preview {
      margin-top: 10px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fbfdff;
      min-height: 72px;
      white-space: pre-wrap;
      line-height: 1.65;
      color: #334155;
    }
    .companion-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .companion-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--primary);
      font-size: .84rem;
      font-weight: 700;
    }
    .waifu {
      z-index: 997 !important;
      left: auto !important;
      right: 12px !important;
      bottom: -6px !important;
    }
    #waifu {
      left: auto !important;
      right: 12px !important;
      bottom: -6px !important;
    }
    #waifu-tool {
      left: auto !important;
      right: 16px !important;
    }
    .companion-field {
      margin-top: 12px;
      display: grid;
      gap: 8px;
    }
    .companion-field label {
      font-size: .88rem;
      color: var(--muted);
      font-weight: 600;
    }
    .companion-select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      background: #fff;
      color: var(--text);
    }
    @media (max-width: 980px) {
      .hero-grid, .grid { grid-template-columns: 1fr; }
      .companion-panel {
        right: 12px;
        left: 12px;
        bottom: 286px;
        width: auto;
      }
    }
  </style>
</head>

  <div class="shell">
    <header class="topbar">
      <div>
        <div id="pageTitle" style="font-size:1.5rem;font-weight:700;"></div>
        <div id="pageSubtitle" class="muted"></div>
      </div>
      <a href="student_hub.html" id="backLink"></a>
    </header>

    <section class="hero">
      <h1 id="heroTitle"></h1>
      <p id="heroText"></p>
      <div class="hero-grid">
        <div class="meta-grid">
          <div class="meta-box">
            <strong id="labelTopic"></strong>
            <div id="topicText"></div>
          </div>
          <div class="meta-box">
            <strong id="labelPhase"></strong>
            <div id="phaseText"></div>
          </div>
          <div class="meta-box">
            <strong id="labelAgent"></strong>
            <div>AG3_AdaptiveTutor</div>
          </div>
          <div class="meta-box">
            <strong id="labelMode"></strong>
            <div id="llmModeText"></div>
          </div>
        </div>

        <div class="card" style="padding:16px;">
          <h2 id="riskPanelTitle" style="margin-top:0;"></h2>
          <div class="slider-row">
            <input id="riskInput" type="range" min="0" max="1" step="0.05" value="0.2" />
            <span id="riskValue">0.20</span>
          </div>
          <div style="margin-top:10px;">
            <span class="tag success" id="riskTag"></span>
            <span class="tag success" id="abacTag"></span>
          </div>
          <div class="mini-note" style="margin-top:10px;" id="riskHint"></div>
        </div>
      </div>
    </section>

    <section class="grid">
      <div class="stack">
        <article class="card">
          <h2 id="planTitle"></h2>
          <div id="planTags"></div>
          <div id="planList" class="list"></div>
        </article>

        <article class="card">
          <h2 id="ag4Title"></h2>
          <pre id="ag4Context"></pre>
        </article>

        <article class="card">
          <h2 id="reflectionTitle"></h2>
          <pre id="reflectionPad"></pre>
        </article>
      </div>

      <div class="stack">
        <article class="card">
          <h2 id="chatTitle"></h2>
          <div id="chatWindow" class="chat-window"></div>

          <div class="controls">
            <label>
              <span id="messageLabel"></span>
              <textarea id="messageInput"></textarea>
            </label>

            <div class="btn-row">
              <button class="btn" id="sendBtn"></button>
              <button class="btn secondary" id="initBtn"></button>
              <button class="btn secondary" id="clearBtn"></button>
            </div>

            <div id="statusText" class="status"></div>
          </div>
        </article>
      </div>
    </section>
  </div>

  <aside class="companion-panel" id="companionPanel">
    <div class="companion-header" id="companionHeader">
      <div class="companion-title-wrap">
        <h3 id="companionTitle"></h3>
      </div>
      <div class="companion-header-actions">
        <button class="icon-btn" id="minimizeCompanionBtn" type="button" title="toggle">-</button>
        <button class="icon-btn" id="closeCompanionBtn" type="button" title="close">x</button>
      </div>
    </div>
    <div class="companion-body" id="companionBody">
      <div class="companion-status" id="companionStatus"></div>
      <div style="margin-top:10px;">
        <span class="companion-chip" id="voiceStateChip"></span>
        <span class="companion-chip" id="widgetStateChip"></span>
      </div>
      <div class="companion-preview" id="companionPreview"></div>
      <div class="companion-field">
        <label id="voiceLabel" for="voiceSelect"></label>
        <select class="companion-select" id="voiceSelect"></select>
      </div>
      <div class="companion-field">
        <label id="emotionLabel" for="emotionSelect"></label>
        <select class="companion-select" id="emotionSelect"></select>
      </div>
      <div class="companion-actions">
        <button class="btn secondary" id="toggleVoiceBtn" type="button"></button>
        <button class="btn secondary" id="replayVoiceBtn" type="button"></button>
      </div>
    </div>
  </aside>

    document.getElementById("riskHint").textContent = TEXT.riskHint;
    document.getElementById("planTitle").textContent = TEXT.planTitle;
    document.getElementById("ag4Title").textContent = TEXT.ag4Title;
    document.getElementById("reflectionTitle").textContent = TEXT.reflectionTitle;
    document.getElementById("chatTitle").textContent = TEXT.chatTitle;
    document.getElementById("messageLabel").textContent = TEXT.messageLabel;
    document.getElementById("messageInput").placeholder = TEXT.messagePlaceholder;
    document.getElementById("sendBtn").textContent = TEXT.sendBtn;
    document.getElementById("initBtn").textContent = TEXT.initBtn;
    document.getElementById("clearBtn").textContent = TEXT.clearBtn;

    const planningResult = JSON.parse(localStorage.getItem(PLANNING_KEY) || "null");
    const diagnosisResult = JSON.parse(localStorage.getItem(DIAGNOSIS_KEY) || "null");
    const profile = JSON.parse(sessionStorage.getItem("eduMasProfile") || "null");

    const topicText = document.getElementById("topicText");
    const phaseText = document.getElementById("phaseText");
    const llmModeText = document.getElementById("llmModeText");
    const riskInput = document.getElementById("riskInput");
    const riskValue = document.getElementById("riskValue");
    const riskTag = document.getElementById("riskTag");
    const abacTag = document.getElementById("abacTag");
    const planTags = document.getElementById("planTags");
    const planList = document.getElementById("planList");
    const ag4Context = document.getElementById("ag4Context");
    const reflectionPad = document.getElementById("reflectionPad");
    const chatWindow = document.getElementById("chatWindow");
    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");
    const initBtn = document.getElementById("initBtn");
    const clearBtn = document.getElementById("clearBtn");
    const statusText = document.getElementById("statusText");
    const companionPanel = document.getElementById("companionPanel");
    const companionHeader = document.getElementById("companionHeader");
    const companionBody = document.getElementById("companionBody");
    const companionTitle = document.getElementById("companionTitle");
    const companionStatus = document.getElementById("companionStatus");
    const companionPreview = document.getElementById("companionPreview");
    const minimizeCompanionBtn = document.getElementById("minimizeCompanionBtn");
    const closeCompanionBtn = document.getElementById("closeCompanionBtn");
    const toggleVoiceBtn = document.getElementById("toggleVoiceBtn");
    const replayVoiceBtn = document.getElementById("replayVoiceBtn");
    const voiceStateChip = document.getElementById("voiceStateChip");
    const widgetStateChip = document.getElementById("widgetStateChip");
    const voiceLabel = document.getElementById("voiceLabel");
    const voiceSelect = document.getElementById("voiceSelect");
    const emotionLabel = document.getElementById("emotionLabel");
    const emotionSelect = document.getElementById("emotionSelect");

    topicText.textContent = TEXT.notRead;
    phaseText.textContent = TEXT.notInit;
    llmModeText.textContent = TEXT.notCalled;
    ag4Context.textContent = TEXT.noAg4;
    reflectionPad.textContent = TEXT.noReflection;
    companionTitle.textContent = TEXT.companionTitle;
    companionStatus.textContent = `${TEXT.companionIdle} ${TEXT.companionFallback}`;
    companionPreview.textContent = TEXT.companionWaiting;
    replayVoiceBtn.textContent = TEXT.companionReplay;
    voiceLabel.textContent = TEXT.voiceLabel;
    emotionLabel.textContent = TEXT.emotionLabel;
    minimizeCompanionBtn.textContent = "-";

    const sessionId = (profile?.role || "student") + "_" + (profile?.displayName || "guest") + "_tutoring";
    const fallbackTopic = planningResult?.planning_path?.[0]?.objective || "Matrix Multiplication";
    const currentTopic = planningResult?.prompt_preview?.match(/\u5f53\u524d\u4e3b\u9898:\s*(.*)/)?.[1]?.trim() || fallbackTopic;
    let voiceEnabled = true;
    let widgetReady = false;
    let preferredVoice = null;
    let lastSpokenReply = "";
    let selectedEmotion = "neutral";
    let currentAudio = null;
    let companionMinimized = false;
    let draggingCompanion = false;
    let dragOffsetX = 0;
    let dragOffsetY = 0;

    function buildSanitizedProfile() {
      if (diagnosisResult && typeof diagnosisResult === "object") {
        return diagnosisResult;
      }
      return {
        cognitive_style: "Visual_High (LDP_noise_added: 0.05)",
        weakness_tags: ["dimension_mismatch", "calculation_carelessness"],
        stress_level: "Medium"
      };
    }

    function updateRiskUi() {
      const value = Number(riskInput.value);
      riskValue.textContent = value.toFixed(2);
      if (value > 0.8) {
        riskTag.textContent = TEXT.riskHigh;
        riskTag.className = "tag warn";
        abacTag.textContent = TEXT.abacHigh;
        abacTag.className = "tag warn";
      } else if (value > 0.5) {
        riskTag.textContent = TEXT.riskMid;
        riskTag.className = "tag";
        abacTag.textContent = TEXT.abacMid;
        abacTag.className = "tag";
      } else {
        riskTag.textContent = TEXT.riskLow;
        riskTag.className = "tag success";
        abacTag.textContent = TEXT.abacLow;
        abacTag.className = "tag success";
      }
    }

    function renderPlanning() {
      topicText.textContent = currentTopic;
      if (!planningResult?.planning_path?.length) {
        planTags.innerHTML = `<span class="tag warn">${TEXT.noPlanningTag}</span>`;
        planList.innerHTML = `<div class="item"><strong>${TEXT.noPlanningTitle}</strong><div class="muted">${TEXT.noPlanningBody}</div></div>`;
        return;
      }

      planTags.innerHTML = [
        `<span class="tag success">${TEXT.planRead}</span>`,
        `<span class="tag">${planningResult.current_agent || "AG3_AdaptiveTutor"}</span>`
      ].join("");

      planList.innerHTML = planningResult.planning_path.map((step, index) => `
        <div class="item">
          <strong>${TEXT.step} ${index + 1} · ${step.stage}</strong>
          <div><b>${TEXT.objective}</b>${step.objective}</div>
          <div class="muted" style="margin-top:6px;"><b>${TEXT.advice}</b>${step.recommended_action}</div>
        </div>
      `).join("");
    }

    function renderChat(history) {
      if (!history || !history.length) {
        chatWindow.innerHTML = `<div class="bubble system">${TEXT.initBubble}</div>`;
        return;
      }
      chatWindow.innerHTML = history.map((item) => {
        const cls = item.role === "human" ? "user" : item.role === "system" ? "system" : "ai";
        return `<div class="bubble ${cls}">${escapeHtml(item.content)}</div>`;
      }).join("");
      chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function escapeHtml(text) {
      return String(text).replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;");
    }

    function setStatus(message, type) {
      statusText.className = "status" + (type ? " " + type : "");
      statusText.textContent = message;
    }

    function persistSession(data) {
      localStorage.setItem(SESSION_KEY, JSON.stringify(data));
    }

    function refreshCompanionChips() {
      voiceStateChip.textContent = voiceEnabled ? TEXT.companionVoiceOn : TEXT.companionVoiceOff;
      widgetStateChip.textContent = widgetReady ? TEXT.companionWidgetReady : TEXT.companionWidgetLoading;
      toggleVoiceBtn.textContent = voiceEnabled ? TEXT.companionMute : TEXT.companionUnmute;
    }

    function refreshCompanionPanelState() {
      companionPanel.classList.toggle("minimized", companionMinimized);
      minimizeCompanionBtn.textContent = companionMinimized ? "+" : "-";
      minimizeCompanionBtn.title = companionMinimized ? TEXT.companionExpand : TEXT.companionMinimize;
    }

    function startCompanionDrag(event) {
      draggingCompanion = true;
      const rect = companionPanel.getBoundingClientRect();
      dragOffsetX = event.clientX - rect.left;
      dragOffsetY = event.clientY - rect.top;
      companionPanel.style.left = `${rect.left}px`;
      companionPanel.style.top = `${rect.top}px`;
      companionPanel.style.right = "auto";
      companionPanel.style.bottom = "auto";
    }

    function moveCompanion(event) {
      if (!draggingCompanion) {
        return;
      }
      const nextLeft = Math.max(8, Math.min(window.innerWidth - companionPanel.offsetWidth - 8, event.clientX - dragOffsetX));
      const nextTop = Math.max(8, Math.min(window.innerHeight - companionPanel.offsetHeight - 8, event.clientY - dragOffsetY));
      companionPanel.style.left = `${nextLeft}px`;
      companionPanel.style.top = `${nextTop}px`;
    }

    function stopCompanionDrag() {
      draggingCompanion = false;
    }

    function sanitizeSpeechText(text) {
      return String(text || "")
        .replace(/https?:\/\/\S+/g, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function pickVoice() {
      const voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
      preferredVoice = voices.find((voice) => voice.lang === "zh-CN")
        || voices.find((voice) => voice.lang.toLowerCase().startsWith("zh"))
        || voices.find((voice) => voice.default)
        || null;
    }

    function populateVoices() {
      voiceSelect.innerHTML = "";
      TTS_VOICE_OPTIONS.forEach((voice) => {
        const option = document.createElement("option");
        option.value = voice.value;
        option.textContent = voice.label;
        voiceSelect.appendChild(option);
      });
      if (!TTS_VOICE_OPTIONS.length) {
        const emptyOption = document.createElement("option");
        emptyOption.value = "";
        emptyOption.textContent = TEXT.voiceNoSupport;
        voiceSelect.appendChild(emptyOption);
      }
      voiceSelect.value = TTS_VOICE_OPTIONS[0]?.value || "";
    }

    function populateEmotionPresets() {
      const options = [
        { value: "neutral", label: TEXT.emotionNeutral },
        { value: "bright", label: TEXT.emotionBright },
        { value: "calm", label: TEXT.emotionCalm },
        { value: "firm", label: TEXT.emotionFirm }
      ];
      emotionSelect.innerHTML = options.map((item) => `<option value="${item.value}">${item.label}</option>`).join("");
      emotionSelect.value = selectedEmotion;
    }

    function getSpeechStyle() {
      if (selectedEmotion === "bright") {
        return { rate: 1.08, pitch: 1.18, volume: 1 };
      }
      if (selectedEmotion === "calm") {
        return { rate: 0.9, pitch: 0.92, volume: 0.95 };
      }
      if (selectedEmotion === "firm") {
        return { rate: 0.98, pitch: 0.86, volume: 1 };
      }
      return { rate: 1, pitch: 1.02, volume: 1 };
    }

    function resolveSelectedBrowserVoice() {
      const voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
      if (voiceSelect.value && voices[Number(voiceSelect.value)]) {
        return voices[Number(voiceSelect.value)];
      }
      return preferredVoice;
    }

    async function callTtsApi(text) {
      const body = {
        text,
        voice_name: voiceSelect.value || "xiaoyan",
        emotion: selectedEmotion
      };

      let lastError = null;
      for (const apiUrl of TTS_API_CANDIDATES) {
        try {
          const response = await fetch(apiUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body)
          });
          if (response.status === 404) {
            lastError = new Error(`API not found: ${apiUrl}`);
            continue;
          }
          const result = await response.json();
          if (!response.ok) {
            throw new Error(result.detail || "TTS API failed");
          }
          return result;
        } catch (error) {
          lastError = error;
        }
      }
      throw lastError || new Error("TTS unavailable");
    }

    function playAudioBase64(result) {
      if (currentAudio) {
        currentAudio.pause();
      }
      currentAudio = new Audio(`data:${result.mime_type || "audio/mpeg"};base64,${result.audio_base64}`);
      currentAudio.play().catch(() => {});
    }

    function speakByBrowser(text) {
      const cleanText = sanitizeSpeechText(text);
      if (!cleanText) {
        return;
      }
      lastSpokenReply = cleanText;
      companionPreview.textContent = cleanText;
      if (!voiceEnabled || !("speechSynthesis" in window)) {
        return;
      }
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(cleanText);
      const activeVoice = resolveSelectedBrowserVoice();
      const style = getSpeechStyle();
      utterance.lang = activeVoice?.lang || "zh-CN";
      utterance.rate = style.rate;
      utterance.pitch = style.pitch;
      utterance.volume = style.volume;
      if (activeVoice) {
        utterance.voice = activeVoice;
      }
      window.speechSynthesis.speak(utterance);
    }

    async function speakReply(text) {
      const cleanText = sanitizeSpeechText(text);
      if (!cleanText) {
        return;
      }
      lastSpokenReply = cleanText;
      companionPreview.textContent = cleanText;
      if (!voiceEnabled) {
        return;
      }
      try {
        const ttsResult = await callTtsApi(cleanText);
        playAudioBase64(ttsResult);
      } catch (error) {
        companionStatus.textContent = `${TEXT.companionIdle} ${TEXT.ttsFallback}`;
        speakByBrowser(cleanText);
      }
    }

    async function syncCompanionWithResult(result) {
      const latestReply = sanitizeSpeechText(result?.tutor_reply || "");
      if (latestReply) {
        await speakReply(latestReply);
        return;
      }
      const history = result?.chat_history_preview || [];
      const latestAi = [...history].reverse().find((item) => item.role === "ai");
      if (latestAi?.content) {
        await speakReply(latestAi.content);
      }
    }

    function setupLive2DWidget() {
      if (document.querySelector('script[data-live2d-autoload="true"]')) {
        return;
      }
      const script = document.createElement("script");
      script.src = "https://fastly.jsdelivr.net/npm/live2d-widgets@1.0.0-rc.4/dist/autoload.js";
      script.async = true;
      script.dataset.live2dAutoload = "true";
      script.onload = () => {
        const tryInit = () => {
          if (typeof window.initWidget !== "function") {
            window.setTimeout(tryInit, 150);
            return;
          }
          window.initWidget({
            waifuPath: "https://fastly.jsdelivr.net/npm/live2d-widgets@1/dist/waifu-tips.json",
            cubism2Path: "https://fastly.jsdelivr.net/npm/live2d-widgets@1/dist/live2d.min.js",
            modelId: 1,
            tools: ["switch-model", "switch-texture", "photo", "info", "quit"],
            drag: true,
            logLevel: "warn"
          });
          widgetReady = true;
          refreshCompanionChips();
          const waifuNode = document.getElementById("waifu");
          if (waifuNode) {
            waifuNode.style.left = "auto";
            waifuNode.style.right = "12px";
            waifuNode.style.bottom = "-6px";
          }
        };
        tryInit();
      };
      script.onerror = () => {
        widgetReady = false;
        widgetStateChip.textContent = TEXT.companionWidgetFailed;
        companionStatus.textContent = `${TEXT.companionIdle} ${TEXT.companionFallback}`;
      };
      document.body.appendChild(script);
    }

    function restoreSession() {
      const raw = localStorage.getItem(SESSION_KEY);
      if (!raw) {
        renderChat([]);
        return null;
      }
      try {
        const saved = JSON.parse(raw);
        phaseText.textContent = saved.current_phase || "Tutoring";
        llmModeText.textContent = saved.llm_mode || "mock";
        ag4Context.textContent = saved.ag4_retrieved_context || TEXT.noAg4;
        reflectionPad.textContent = saved.reflection_scratchpad || TEXT.noReflection;
        renderChat(saved.chat_history_preview || []);
        companionPreview.textContent = saved.tutor_reply || TEXT.companionWaiting;
        return saved;
      } catch {
        renderChat([]);
        return null;
      }
    }

    async function callTutoringApi(userMessage) {
      const body = {
        session_id: sessionId,
        sanitized_profile: buildSanitizedProfile(),
        current_topic: currentTopic,
        user_message: userMessage || "",
        gnn_risk_score: Number(riskInput.value)
      };

      let lastError = null;
      for (const apiUrl of API_CANDIDATES) {
        try {
          const response = await fetch(apiUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body)
          });
          if (response.status === 404) {
            lastError = new Error(`API not found: ${apiUrl}`);
            continue;
          }
          const result = await response.json();
          if (!response.ok) {
            throw new Error(result.detail || "Tutoring API failed");
          }
          return result;
        } catch (error) {
          lastError = error;
        }
      }
      throw lastError || new Error(TEXT.apiMissing);
    }

    async function initializeTutoring() {
      sendBtn.disabled = true;
      initBtn.disabled = true;
      setStatus(TEXT.statusInit, "");
      try {
        const result = await callTutoringApi("");
        phaseText.textContent = result.current_phase || "Tutoring";
        llmModeText.textContent = result.llm_mode || "mock";
        ag4Context.textContent = result.ag4_retrieved_context || TEXT.noAg4;
        reflectionPad.textContent = result.reflection_scratchpad || TEXT.noReflection;
        renderChat(result.chat_history_preview || []);
        persistSession(result);
        await syncCompanionWithResult(result);
        setStatus(TEXT.statusInitOk, "ok");
      } catch (error) {
        setStatus(`\u521d\u59cb\u5316\u5931\u8d25\uff1a${error.message}\u3002${TEXT.restartHint}`, "error");
      } finally {
        sendBtn.disabled = false;
        initBtn.disabled = false;
      }
    }

    async function sendMessage() {
      const message = messageInput.value.trim();
      if (!message) {
        setStatus(TEXT.statusNeedInput, "error");
        return;
      }
      sendBtn.disabled = true;
      initBtn.disabled = true;
      setStatus(TEXT.statusSending, "");
      try {
        const result = await callTutoringApi(message);
        messageInput.value = "";
        phaseText.textContent = result.current_phase || "Tutoring";
        llmModeText.textContent = result.llm_mode || "mock";
        ag4Context.textContent = result.ag4_retrieved_context || TEXT.noAg4;
        reflectionPad.textContent = result.reflection_scratchpad || TEXT.noReflection;
        renderChat(result.chat_history_preview || []);
        persistSession(result);
        await syncCompanionWithResult(result);
        setStatus(result.need_ag4_search ? TEXT.statusAg4 : TEXT.statusUpdated, "ok");
      } catch (error) {
        setStatus(`\u8c03\u7528\u5931\u8d25\uff1a${error.message}\u3002${TEXT.restartHint}`, "error");
      } finally {
        sendBtn.disabled = false;
        initBtn.disabled = false;
      }
    }

    function clearSession() {
      localStorage.removeItem(SESSION_KEY);
      ag4Context.textContent = TEXT.noAg4;
      reflectionPad.textContent = TEXT.noReflection;
      phaseText.textContent = TEXT.notInit;
      llmModeText.textContent = TEXT.notCalled;
      messageInput.value = "";
      companionPreview.textContent = TEXT.companionWaiting;
      if (currentAudio) {
        currentAudio.pause();
        currentAudio = null;
      }
      renderChat([]);
      setStatus(TEXT.statusCleared, "ok");
    }

    riskInput.addEventListener("input", updateRiskUi);
    sendBtn.addEventListener("click", sendMessage);
    initBtn.addEventListener("click", initializeTutoring);
    clearBtn.addEventListener("click", clearSession);
    toggleVoiceBtn.addEventListener("click", () => {
      voiceEnabled = !voiceEnabled;
      if (!voiceEnabled && "speechSynthesis" in window) {
        window.speechSynthesis.cancel();
      }
      if (!voiceEnabled && currentAudio) {
        currentAudio.pause();
      }
      refreshCompanionChips();
      if (voiceEnabled && lastSpokenReply) {
        speakReply(lastSpokenReply);
      }
    });
    minimizeCompanionBtn.addEventListener("click", () => {
      companionMinimized = !companionMinimized;
      refreshCompanionPanelState();
    });
    closeCompanionBtn.addEventListener("click", () => {
      companionPanel.style.display = "none";
      setStatus(TEXT.companionClosed, "ok");
    });
    replayVoiceBtn.addEventListener("click", () => {
      if (lastSpokenReply) {
        speakReply(lastSpokenReply);
      } else {
        companionPreview.textContent = TEXT.companionWaiting;
      }
    });
    voiceSelect.addEventListener("change", () => {
      if (lastSpokenReply && voiceEnabled) {
        speakReply(lastSpokenReply);
      }
    });
    emotionSelect.addEventListener("change", () => {
      selectedEmotion = emotionSelect.value || "neutral";
      if (lastSpokenReply && voiceEnabled) {
        speakReply(lastSpokenReply);
      }
    });
    companionHeader.addEventListener("pointerdown", (event) => {
      if (event.target.closest("button")) {
        return;
      }
      startCompanionDrag(event);
    });
    window.addEventListener("pointermove", moveCompanion);
    window.addEventListener("pointerup", stopCompanionDrag);
    messageInput.addEventListener("keydown", (event) => {
      if ((event.ctrlKey || event.metaKey) && event.key === "Enter") {
        sendMessage();
      }
    });
    populateVoices();
    populateEmotionPresets();
    if ("speechSynthesis" in window) {
      pickVoice();
      window.speechSynthesis.addEventListener?.("voiceschanged", pickVoice);
    }

    refreshCompanionChips();
    refreshCompanionPanelState();
    setupLive2DWidget();
    updateRiskUi();
    renderPlanning();
    if (!restoreSession()) {
      renderChat([]);
    }
  </script>
</body>
</html>
