<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>&#33258;&#36866;&#24212;&#36741;&#23548;</title>
  <script src="./auth.js" data-required-role="student"></script>
  <script src="./student_stage_guard.js" data-requires-planning="true"></script>
  <style>
    :root {
      --bg: #f6f8fb;
      --card: #ffffff;
      --text: #243447;
      --muted: #6b7c93;
      --line: #dbe3ee;
      --primary: #2563eb;
      --soft: #eef4ff;
      --accent: #166534;
      --warn: #b45309;
      --danger: #b42318;
      --shadow: 0 12px 32px rgba(36, 52, 71, 0.08);
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
    .shell { width: min(1180px, calc(100% - 28px)); margin: 0 auto; padding: 24px 0 40px; }
    .topbar, .card, .hero { background: #fff; border: 1px solid var(--line); border-radius: 20px; box-shadow: var(--shadow); }
    .topbar { display: flex; justify-content: space-between; align-items: center; gap: 16px; padding: 18px 22px; margin-bottom: 20px; }
    .topbar a { color: #244e7a; text-decoration: none; font-weight: 600; }
    .hero { padding: 22px; margin-bottom: 20px; }
    .hero h1 { margin: 0 0 12px; font-size: 2rem; }
    .hero p, .muted { color: var(--muted); line-height: 1.8; }
    .hero-grid { display: grid; grid-template-columns: 1.05fr .95fr; gap: 18px; margin-top: 18px; }
    .grid { display: grid; grid-template-columns: 1.05fr .95fr; gap: 18px; }
    .stack { display: grid; gap: 18px; }
    .card { padding: 22px; }
    .card h2 { margin: 0 0 12px; font-size: 1.2rem; }
    .tag { display: inline-flex; padding: 6px 10px; border-radius: 999px; background: var(--soft); color: var(--primary); font-size: .88rem; font-weight: 700; margin-right: 8px; margin-bottom: 8px; }
    .tag.warn { background: #fff7ed; color: var(--warn); }
    .tag.success { background: #ecfdf3; color: var(--accent); }
    .list { display: grid; gap: 12px; margin-top: 14px; }
    .item { border: 1px solid var(--line); border-radius: 16px; padding: 14px; background: #fbfdff; }
    .item strong { display: block; margin-bottom: 8px; }
    .meta-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .meta-box { border: 1px solid var(--line); border-radius: 14px; padding: 14px; background: #fcfcfd; }
    .meta-box strong { display: block; margin-bottom: 8px; }
    .chat-window { border: 1px solid var(--line); border-radius: 18px; background: #fbfdff; padding: 14px; min-height: 420px; max-height: 620px; overflow: auto; }
    .bubble { max-width: 88%; padding: 12px 14px; border-radius: 16px; margin-bottom: 12px; white-space: pre-wrap; line-height: 1.7; }
    .bubble.user { margin-left: auto; background: #e8f0ff; color: #173a70; border-bottom-right-radius: 6px; }
    .bubble.ai { background: #eefbf3; color: #13452c; border-bottom-left-radius: 6px; }
    .bubble.system { background: #fff7ed; color: #8a4b08; border-bottom-left-radius: 6px; }
    .controls { display: grid; gap: 12px; margin-top: 14px; }
    textarea, input[type="range"] { width: 100%; font: inherit; }
    textarea { border: 1px solid var(--line); border-radius: 14px; padding: 12px 14px; background: #fff; min-height: 110px; resize: vertical; }
    .btn-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .btn { display: inline-flex; align-items: center; justify-content: center; border: none; border-radius: 14px; padding: 12px 16px; background: var(--primary); color: #fff; font-weight: 700; cursor: pointer; }
    .btn.secondary { background: #eef4ff; color: #244e7a; border: 1px solid #d8e3f2; }
    .btn:disabled { opacity: .6; cursor: not-allowed; }
    .status { margin-top: 10px; font-size: .95rem; }
    .status.error { color: var(--danger); }
    .status.ok { color: var(--accent); }
    pre { white-space: pre-wrap; word-break: break-word; background: #f8fafc; border: 1px solid var(--line); border-radius: 14px; padding: 14px; color: #334155; }
    .slider-row { display: grid; grid-template-columns: 1fr auto; gap: 14px; align-items: center; }
    .mini-note { font-size: .9rem; color: var(--muted); }
    .companion-panel {
      position: fixed;
      right: 22px;
      top: 136px;
      width: min(320px, calc(100vw - 24px));
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.96);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      z-index: 998;
      max-height: calc(100vh - 152px);
      overflow: hidden;
    }
    .companion-panel.minimized .companion-body {
      display: none;
    }
    .companion-body {
      max-height: calc(100vh - 232px);
      overflow: auto;
      padding-right: 2px;
    }
    .companion-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      cursor: move;
      padding-bottom: 6px;
      border-bottom: 1px dashed #e2e8f0;
    }
    .companion-title-wrap {
      min-width: 0;
    }
    .companion-panel h3 {
      margin: 0 0 8px;
      font-size: 1rem;
    }
    .companion-header h3 {
      margin: 0;
    }
    .companion-header-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .icon-btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 999px;
      width: 32px;
      height: 32px;
      cursor: pointer;
      font-weight: 700;
    }
    .companion-status {
      font-size: .92rem;
      color: var(--muted);
      line-height: 1.7;
    }
    .companion-drag-hint {
      margin-top: 6px;
      font-size: .82rem;
      color: var(--muted);
    }
    .companion-preview {
      margin-top: 10px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fbfdff;
      min-height: 72px;
      white-space: pre-wrap;
      line-height: 1.65;
      color: #334155;
    }
    .companion-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .companion-footer {
      display: flex;
      justify-content: flex-end;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px dashed #e2e8f0;
    }
    .companion-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--primary);
      font-size: .84rem;
      font-weight: 700;
    }
    .waifu {
      z-index: 997 !important;
      left: auto !important;
      right: 12px !important;
      bottom: -6px !important;
    }
    #waifu {
      left: auto !important;
      right: 12px !important;
      bottom: -6px !important;
    }
    #waifu-tool {
      left: auto !important;
      right: 16px !important;
    }
    .waifu-tips {
      position: fixed !important;
      left: auto !important;
      right: 160px !important;
      bottom: 240px !important;
      max-width: min(360px, calc(100vw - 32px)) !important;
      cursor: move !important;
      user-select: none;
      padding-right: 42px !important;
      z-index: 999 !important;
    }
    .waifu-tips-close {
      position: absolute;
      top: 8px;
      right: 10px;
      width: 24px;
      height: 24px;
      border-radius: 999px;
      border: 1px solid rgba(36, 52, 71, 0.12);
      background: rgba(255, 255, 255, 0.92);
      color: #243447;
      font-size: 14px;
      line-height: 1;
      cursor: pointer;
    }
    .companion-field {
      margin-top: 12px;
      display: grid;
      gap: 8px;
    }
    .companion-field label {
      font-size: .88rem;
      color: var(--muted);
      font-weight: 600;
    }
    .companion-select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      background: #fff;
      color: var(--text);
    }
    .companion-toggle {
      position: fixed;
      right: 18px;
      top: 180px;
      z-index: 999;
      display: none;
      align-items: center;
      justify-content: center;
      min-width: 120px;
      padding: 10px 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.96);
      box-shadow: var(--shadow);
      color: var(--primary);
      font-weight: 700;
      cursor: pointer;
      backdrop-filter: blur(12px);
    }
    .companion-toggle.visible {
      display: inline-flex;
    }
    .left-widget {
      position: fixed;
      left: 18px;
      top: 148px;
      width: 180px;
      z-index: 996;
      display: grid;
      gap: 14px;
    }
    .quote-card, .cube-card {
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      overflow: hidden;
    }
    .quote-card {
      padding: 16px;
    }
    .quote-title {
      font-size: .86rem;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: .04em;
      margin-bottom: 10px;
    }
    .quote-text {
      line-height: 1.9;
      color: #334155;
      font-size: .95rem;
      min-height: 96px;
    }
    .quote-tip {
      margin-top: 10px;
      font-size: .82rem;
      color: var(--muted);
    }
    .cube-card {
      padding: 14px 12px 16px;
      text-align: center;
      min-height: 260px;
    }
    .cube-title {
      font-size: .84rem;
      font-weight: 800;
      color: #7c3aed;
      margin-bottom: 8px;
    }
    .cube-tip {
      margin-top: 8px;
      font-size: .78rem;
      color: var(--muted);
      line-height: 1.6;
    }
    .cube-scene {
      position: relative;
      width: 146px;
      height: 146px;
      margin: 12px auto 4px;
      perspective: 680px;
      perspective-origin: center;
      overflow: hidden;
      border-radius: 18px;
      background: radial-gradient(circle at center, rgba(124, 58, 237, 0.08), rgba(96, 165, 250, 0.03));
    }
    .cube {
      position: absolute;
      top: 37px;
      left: 37px;
      width: 72px;
      height: 72px;
      transform-style: preserve-3d;
      animation:
        cube-float 9s ease-in-out infinite alternate,
        cube-spin 12s linear infinite;
      transition: transform .45s ease, top .45s ease, left .45s ease;
    }
    .cube-face {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      font-weight: 800;
      color: #fff;
      border: 2px solid rgba(255, 255, 255, 0.72);
      box-shadow: inset 0 0 18px rgba(255, 255, 255, 0.15);
      transition: transform .45s ease;
      text-align: center;
      line-height: 1.15;
      padding: 6px;
    }
    .cube-face.front { background: linear-gradient(135deg, #60a5fa, #2563eb); transform: translateZ(36px); }
    .cube-face.back { background: linear-gradient(135deg, #22c55e, #15803d); transform: rotateY(180deg) translateZ(36px); }
    .cube-face.right { background: linear-gradient(135deg, #f59e0b, #d97706); transform: rotateY(90deg) translateZ(36px); }
    .cube-face.left { background: linear-gradient(135deg, #ec4899, #be185d); transform: rotateY(-90deg) translateZ(36px); }
    .cube-face.top { background: linear-gradient(135deg, #a78bfa, #7c3aed); transform: rotateX(90deg) translateZ(36px); }
    .cube-face.bottom { background: linear-gradient(135deg, #14b8a6, #0f766e); transform: rotateX(-90deg) translateZ(36px); }
    .cube-scene:hover .cube {
      animation-play-state: paused;
      transform: rotateX(-18deg) rotateY(28deg);
    }
    .cube-scene:hover .cube::before {
      opacity: 1;
    }
    .cube-scene:hover .cube-face.front { transform: translateZ(58px); }
    .cube-scene:hover .cube-face.back { transform: rotateY(180deg) translateZ(58px); }
    .cube-scene:hover .cube-face.right { transform: rotateY(90deg) translateZ(58px); }
    .cube-scene:hover .cube-face.left { transform: rotateY(-90deg) translateZ(58px); }
    .cube-scene:hover .cube-face.top { transform: rotateX(90deg) translateZ(58px); }
    .cube-scene:hover .cube-face.bottom { transform: rotateX(-90deg) translateZ(58px); }
    @keyframes cube-float {
      0% { top: 16px; left: 12px; }
      20% { top: 52px; left: 58px; }
      45% { top: 74px; left: 22px; }
      70% { top: 28px; left: 70px; }
      100% { top: 58px; left: 40px; }
    }
    @keyframes cube-spin {
      0% { transform: rotateX(-18deg) rotateY(0deg); }
      100% { transform: rotateX(-18deg) rotateY(360deg); }
    }
    @media (max-width: 980px) {
      .hero-grid, .grid { grid-template-columns: 1fr; }
      .left-widget {
        position: static;
        width: 100%;
        grid-template-columns: 1fr 1fr;
        margin-bottom: 18px;
      }
      .companion-panel {
        right: 12px;
        left: 12px;
        top: 118px;
        width: auto;
        max-height: calc(100vh - 134px);
      }
      .companion-body {
        max-height: calc(100vh - 214px);
      }
      .companion-toggle {
        right: 12px;
        top: 144px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="left-widget">
      <section class="quote-card">
        <div class="quote-title">每日一句</div>
        <div class="quote-text" id="dailyQuoteText"></div>
        <div class="quote-tip">学习不用一次跑太快，关键是把思路走清楚。</div>
      </section>
      <section class="cube-card">
        <div class="cube-title">无限进步魔方</div>
        <div class="cube-scene" id="cubeScene">
          <div class="cube">
            <div class="cube-face front">无</div>
            <div class="cube-face back">限</div>
            <div class="cube-face right">进</div>
            <div class="cube-face left">步</div>
            <div class="cube-face top">无</div>
            <div class="cube-face bottom">限</div>
          </div>
        </div>
        <div class="cube-tip">魔方会在区域里缓慢游走，鼠标移上去会展开，提醒我们从不同角度拆题、持续进步。</div>
      </section>
    </aside>

    <header class="topbar">
      <div>
        <div id="pageTitle" style="font-size:1.5rem;font-weight:700;"></div>
        <div id="pageSubtitle" class="muted"></div>
      </div>
      <a href="student_hub.html" id="backLink" data-nav-back="true"></a>
    </header>

    <section class="hero">
      <h1 id="heroTitle"></h1>
      <p id="heroText"></p>
      <div class="hero-grid">
        <div class="meta-grid">
          <div class="meta-box">
            <strong id="labelTopic"></strong>
            <div id="topicText"></div>
          </div>
          <div class="meta-box">
            <strong id="labelPhase"></strong>
            <div id="phaseText"></div>
          </div>
          <div class="meta-box">
            <strong id="labelAgent"></strong>
            <div>AG3_AdaptiveTutor</div>
          </div>
          <div class="meta-box">
            <strong id="labelMode"></strong>
            <div id="llmModeText"></div>
          </div>
        </div>

        <div class="card" style="padding:16px;">
          <h2 id="riskPanelTitle" style="margin-top:0;"></h2>
          <div class="slider-row">
            <input id="riskInput" type="range" min="0" max="1" step="0.05" value="0.2" />
            <span id="riskValue">0.20</span>
          </div>
          <div style="margin-top:10px;">
            <span class="tag success" id="riskTag"></span>
            <span class="tag success" id="abacTag"></span>
          </div>
          <div class="mini-note" style="margin-top:10px;" id="riskHint"></div>
        </div>
      </div>
    </section>

    <section class="grid">
      <div class="stack">
        <article class="card">
          <h2 id="planTitle"></h2>
          <div id="planTags"></div>
          <div id="planList" class="list"></div>
        </article>

        <article class="card">
          <h2 id="ag4Title"></h2>
          <pre id="ag4Context"></pre>
        </article>

        <article class="card">
          <h2 id="reflectionTitle"></h2>
          <pre id="reflectionPad"></pre>
        </article>
      </div>

      <div class="stack">
        <article class="card">
          <h2 id="chatTitle"></h2>
          <div id="chatWindow" class="chat-window"></div>

          <div class="controls">
            <label>
              <span id="messageLabel"></span>
              <textarea id="messageInput"></textarea>
            </label>

            <div class="btn-row">
              <button class="btn" id="sendBtn"></button>
              <button class="btn secondary" id="initBtn"></button>
              <button class="btn secondary" id="clearBtn"></button>
            </div>

            <div id="statusText" class="status"></div>
          </div>
        </article>
      </div>
    </section>
  </div>

  <aside class="companion-panel" id="companionPanel">
    <div class="companion-header" id="companionHeader">
      <div class="companion-title-wrap">
        <h3 id="companionTitle"></h3>
        <div class="companion-drag-hint" id="companionDragHint"></div>
      </div>
      <div class="companion-header-actions">
        <button class="icon-btn" id="minimizeCompanionBtn" type="button" title="toggle">-</button>

      </div>

    <div class="companion-body" id="companionBody">

      <div style="margin-top:10px;">

      </div>
      <div class="companion-footer">
        <button class="btn secondary" id="hideCompanionBtn" type="button"></button>
      </div>
    </div>
  </aside>
  <button class="companion-toggle" id="showCompanionBtn" type="button"></button>

    function placeCompanionInSafeArea() {

      const currentLeft = companionPanel.style.left ? Number.parseFloat(companionPanel.style.left) : null;

      const safeLeft = Math.min(maxLeft, Math.max(8, currentLeft ?? (window.innerWidth - companionPanel.offsetWidth - 18)));
      const safeTop = Math.min(maxTop, Math.max(96, currentTop ?? 136));
      companionPanel.style.left = `${safeLeft}px`;

      companionPanel.style.right = "auto";
      companionPanel.style.bottom = "auto";

        .replace(/\s+/g, " ")
        .trim();

    function pickVoice() {
      const voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
      preferredVoice = voices.find((voice) => voice.lang === "zh-CN")
        || voices.find((voice) => voice.lang.toLowerCase().startsWith("zh"))
        || voices.find((voice) => voice.default)
        || null;
    }

        option.textContent = voice.label;

        emptyOption.value = "";

    function populateEmotionPresets() {
      const options = [
        { value: "neutral", label: TEXT.emotionNeutral },
        { value: "bright", label: TEXT.emotionBright },
        { value: "calm", label: TEXT.emotionCalm },
        { value: "firm", label: TEXT.emotionFirm }
      ];
      emotionSelect.innerHTML = options.map((item) => `<option value="${item.value}">${item.label}</option>`).join("");
      emotionSelect.value = selectedEmotion;
    }

    function getSpeechStyle() {
      if (selectedEmotion === "bright") {
        return { rate: 1.08, pitch: 1.18, volume: 1 };
      }
      if (selectedEmotion === "calm") {
        return { rate: 0.9, pitch: 0.92, volume: 0.95 };
      }
      if (selectedEmotion === "firm") {
        return { rate: 0.98, pitch: 0.86, volume: 1 };
      }
      return { rate: 1, pitch: 1.02, volume: 1 };
    }

    function resolveSelectedBrowserVoice() {
      const voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
      if (voiceSelect.value && voices[Number(voiceSelect.value)]) {
        return voices[Number(voiceSelect.value)];
      }
      return preferredVoice;
    }

    async function callTtsApi(text) {
      const body = {
        text,
        voice_name: voiceSelect.value || "xiaoyan",
        emotion: selectedEmotion
      };

      let lastError = null;
      for (const apiUrl of TTS_API_CANDIDATES) {
        try {
          const response = await fetch(apiUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body)
          });
          if (response.status === 404) {
            lastError = new Error(`API not found: ${apiUrl}`);
            continue;
          }
          const result = await parseJsonSafely(response);
          if (!response.ok) {
            throw new Error(result.detail || "TTS API failed");
          }
          return result;
        } catch (error) {
          lastError = error;
        }
      }
      throw lastError || new Error("TTS unavailable");
    }

    function playAudioBase64(result) {
      if (currentAudio) {
        currentAudio.pause();
      }
      currentAudio = new Audio(`data:${result.mime_type || "audio/mpeg"};base64,${result.audio_base64}`);
      currentAudio.play().catch(() => {});
    }

    function speakByBrowser(text) {
      const cleanText = sanitizeSpeechText(text);
      if (!cleanText) {
        return;
      }
      lastSpokenReply = cleanText;
      companionPreview.textContent = cleanText;
      if (!voiceEnabled || !("speechSynthesis" in window)) {
        return;
      }
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(cleanText);
      const activeVoice = resolveSelectedBrowserVoice();
      const style = getSpeechStyle();
      utterance.lang = activeVoice?.lang || "zh-CN";
      utterance.rate = style.rate;
      utterance.pitch = style.pitch;
      utterance.volume = style.volume;
      if (activeVoice) {
        utterance.voice = activeVoice;
      }
      window.speechSynthesis.speak(utterance);
    }

    async function speakReply(text) {
      const cleanText = sanitizeSpeechText(text);
      if (!cleanText) {
        return;
      }
      lastSpokenReply = cleanText;
      companionPreview.textContent = cleanText;
      if (!voiceEnabled) {
        return;
      }
      try {
        const ttsResult = await callTtsApi(cleanText);
        playAudioBase64(ttsResult);
      } catch (error) {
        companionStatus.textContent = `${TEXT.companionIdle} ${TEXT.ttsFallback}`;
        speakByBrowser(cleanText);
      }
    }

    async function syncCompanionWithResult(result) {
      restoreWaifuTips();
      const latestReply = sanitizeSpeechText(result?.tutor_reply || "");
      if (latestReply) {
        await speakReply(latestReply);
        return;
      }
      const history = result?.chat_history_preview || [];
      const latestAi = [...history].reverse().find((item) => item.role === "ai");
      if (latestAi?.content) {
        await speakReply(latestAi.content);
      }
    }

    function setupLive2DWidget() {
      if (document.querySelector('script[data-live2d-autoload="true"]')) {
        return;
      }
      const script = document.createElement("script");
      script.src = "https://fastly.jsdelivr.net/npm/live2d-widgets@1.0.0-rc.4/dist/autoload.js";
      script.async = true;
      script.dataset.live2dAutoload = "true";
      script.onload = () => {
        const tryInit = () => {
          if (typeof window.initWidget !== "function") {
            window.setTimeout(tryInit, 150);
            return;
          }
          window.initWidget({
            waifuPath: waifuTipsUrl,
            cubism2Path: "https://fastly.jsdelivr.net/npm/live2d-widgets@1/dist/live2d.min.js",
            modelId: 1,
            tools: ["switch-model", "switch-texture", "photo", "info", "quit"],
            drag: true,
            logLevel: "warn"
          });
          widgetReady = true;
          refreshCompanionChips();
          const waifuNode = document.getElementById("waifu");
          if (waifuNode) {
            waifuNode.style.left = "auto";
            waifuNode.style.right = "12px";
            waifuNode.style.bottom = "-6px";
          }
          restoreWaifuTips();
        };
        tryInit();
      };
      script.onerror = () => {
        widgetReady = false;
        widgetStateChip.textContent = TEXT.companionWidgetFailed;
        companionStatus.textContent = `${TEXT.companionIdle} ${TEXT.companionFallback}`;
      };
      document.body.appendChild(script);
    }

    function restoreSession() {
      const raw = localStorage.getItem(SESSION_KEY);
      if (!raw) {
        renderChat([]);
        return null;
      }
      try {
        const saved = JSON.parse(raw);
        phaseText.textContent = saved.current_phase || "Tutoring";
        llmModeText.textContent = saved.llm_mode || "mock";
        ag4Context.textContent = saved.ag4_retrieved_context || TEXT.noAg4;
        reflectionPad.textContent = saved.reflection_scratchpad || TEXT.noReflection;
        renderChat(saved.chat_history_preview || []);
        companionPreview.textContent = saved.tutor_reply || TEXT.companionWaiting;
        return saved;
      } catch {
        renderChat([]);
        return null;
      }
    }

    async function callTutoringApi(userMessage) {
      const body = {
        session_id: sessionId,
        sanitized_profile: buildSanitizedProfile(),
        current_topic: currentTopic,
        user_message: userMessage || "",
        gnn_risk_score: Number(riskInput.value)
      };

      let lastError = null;
      for (const apiUrl of API_CANDIDATES) {
        try {
          const response = await fetch(apiUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body)
          });
          if (response.status === 404) {
            lastError = new Error(`API not found: ${apiUrl}`);
            continue;
          }
          const result = await parseJsonSafely(response);
          if (!response.ok) {
            throw new Error(result.detail || "Tutoring API failed");
          }
          return result;
        } catch (error) {
          lastError = error;
        }
      }
      throw lastError || new Error(TEXT.apiMissing);
    }

    async function initializeTutoring() {
      sendBtn.disabled = true;
      initBtn.disabled = true;
      setStatus(TEXT.statusInit, "");
      try {
        const result = await callTutoringApi("");
        phaseText.textContent = result.current_phase || "Tutoring";
        llmModeText.textContent = result.llm_mode || "mock";
        ag4Context.textContent = result.ag4_retrieved_context || TEXT.noAg4;
        reflectionPad.textContent = result.reflection_scratchpad || TEXT.noReflection;
        renderChat(result.chat_history_preview || []);
        persistSession(result);
        await syncCompanionWithResult(result);
        setStatus(TEXT.statusInitOk, "ok");
      } catch (error) {
        setStatus(`\u521d\u59cb\u5316\u5931\u8d25\uff1a${error.message}\u3002${TEXT.restartHint}`, "error");
      } finally {
        sendBtn.disabled = false;
        initBtn.disabled = false;
      }
    }

    async function sendMessage() {
      const message = messageInput.value.trim();
      if (!message) {
        setStatus(TEXT.statusNeedInput, "error");
        return;
      }
      sendBtn.disabled = true;
      initBtn.disabled = true;
      setStatus(TEXT.statusSending, "");
      try {
        const result = await callTutoringApi(message);
        messageInput.value = "";
        phaseText.textContent = result.current_phase || "Tutoring";
        llmModeText.textContent = result.llm_mode || "mock";
        ag4Context.textContent = result.ag4_retrieved_context || TEXT.noAg4;
        reflectionPad.textContent = result.reflection_scratchpad || TEXT.noReflection;
        renderChat(result.chat_history_preview || []);
        persistSession(result);
        await syncCompanionWithResult(result);
        setStatus(result.need_ag4_search ? TEXT.statusAg4 : TEXT.statusUpdated, "ok");
      } catch (error) {
        setStatus(`\u8c03\u7528\u5931\u8d25\uff1a${error.message}\u3002${TEXT.restartHint}`, "error");
      } finally {
        sendBtn.disabled = false;
        initBtn.disabled = false;
      }
    }

    function clearSession() {
      localStorage.removeItem(SESSION_KEY);
      ag4Context.textContent = TEXT.noAg4;
      reflectionPad.textContent = TEXT.noReflection;
      phaseText.textContent = TEXT.notInit;
      llmModeText.textContent = TEXT.notCalled;
      messageInput.value = "";
      companionPreview.textContent = TEXT.companionWaiting;
      if (currentAudio) {
        currentAudio.pause();
        currentAudio = null;
      }
      renderChat([]);
      setStatus(TEXT.statusCleared, "ok");
    }

    riskInput.addEventListener("input", updateRiskUi);
    sendBtn.addEventListener("click", sendMessage);
    initBtn.addEventListener("click", initializeTutoring);
    clearBtn.addEventListener("click", clearSession);
    toggleVoiceBtn.addEventListener("click", () => {
      voiceEnabled = !voiceEnabled;
      if (!voiceEnabled && "speechSynthesis" in window) {
        window.speechSynthesis.cancel();
      }
      if (!voiceEnabled && currentAudio) {
        currentAudio.pause();
      }
      refreshCompanionChips();
      if (voiceEnabled && lastSpokenReply) {
        speakReply(lastSpokenReply);
      }
    });
    minimizeCompanionBtn.addEventListener("click", () => {
      companionMinimized = !companionMinimized;
      refreshCompanionPanelState();
    });
    closeCompanionBtn.addEventListener("click", () => {
      companionHidden = true;
      refreshCompanionPanelState();
      setStatus(TEXT.companionHidden, "ok");
    });
    showCompanionBtn.addEventListener("click", () => {
      companionHidden = false;
      refreshCompanionPanelState();
      placeCompanionInSafeArea();
      setStatus(TEXT.companionExpand, "ok");
    });
    hideCompanionBtn.addEventListener("click", () => {
      companionHidden = true;
      refreshCompanionPanelState();
      setStatus(TEXT.companionHidden, "ok");
    });
    replayVoiceBtn.addEventListener("click", () => {
      if (lastSpokenReply) {
        speakReply(lastSpokenReply);
      } else {
        companionPreview.textContent = TEXT.companionWaiting;
      }
    });
    voiceSelect.addEventListener("change", () => {
      if (lastSpokenReply && voiceEnabled) {
        speakReply(lastSpokenReply);
      }
    });
    emotionSelect.addEventListener("change", () => {
      selectedEmotion = emotionSelect.value || "neutral";
      if (lastSpokenReply && voiceEnabled) {
        speakReply(lastSpokenReply);
      }
    });
    companionHeader.addEventListener("pointerdown", (event) => {
      if (event.target.closest("button")) {
        return;
      }
      startCompanionDrag(event);
    });
    window.addEventListener("pointermove", moveCompanion);
    window.addEventListener("pointerup", stopCompanionDrag);
    window.addEventListener("pointermove", moveWaifuTips);
    window.addEventListener("pointerup", stopWaifuTipsDrag);
    window.addEventListener("resize", () => {
      if (!companionHidden) {
        placeCompanionInSafeArea();
      }
    });
    messageInput.addEventListener("keydown", (event) => {
      if ((event.ctrlKey || event.metaKey) && event.key === "Enter") {
        sendMessage();
      }
    });
    populateVoices();
    populateEmotionPresets();
    if ("speechSynthesis" in window) {
      pickVoice();
      window.speechSynthesis.addEventListener?.("voiceschanged", pickVoice);
    }

    refreshCompanionChips();
    refreshCompanionPanelState();
    if (!companionHidden) {
      placeCompanionInSafeArea();
    }
    renderDailyQuote();
    setupLive2DWidget();
    new MutationObserver(() => {
      enhanceWaifuTips();
    }).observe(document.body, { childList: true, subtree: true });
    updateRiskUi();
    renderPlanning();
    if (!restoreSession()) {
      renderChat([]);
    }
  </script>
</body>
</html>
